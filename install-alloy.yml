---
- name: Install Grafana Alloy
  hosts: all
  become: true
  gather_facts: true
  vars:
    alloy_package_name: alloy
    alloy_repo_key_url: https://apt.grafana.com/gpg.key
    alloy_repo_key_path: /etc/apt/keyrings/grafana.gpg
    alloy_repo_definition: "deb [signed-by={{ alloy_repo_key_path }}] https://apt.grafana.com stable main"
    alloy_apt_lock_timeout: 300
    alloy_apt_update_retries: 5
    alloy_apt_update_retry_max_delay: 12
    alloy_apt_task_retries: 3
    alloy_apt_task_retry_delay: 15
    alloy_user: alloy
    alloy_group: alloy
    alloy_config_dir: /etc/alloy
    alloy_config_path: /etc/alloy/config.alloy
    alloy_env_file: /etc/default/alloy
    alloy_storage_path: /var/lib/alloy
    alloy_http_listen_addr: 0.0.0.0:12345
    alloy_log_level: info
    alloy_log_format: logfmt
    alloy_scrape_interval: 30s
    alloy_instance_label: "{{ inventory_hostname }}"
    alloy_node_exporter_labels: 
      service: techmaju_itom_telemetry
      team: devops
      environment: production
      ci_ref: "{{ ci_ref | default('unknown') }}"
    alloy_prometheus_remote_write_url: "https://prometheus.techmaju.com/api/v1/write"
    alloy_prometheus_username: "prometheus"
    alloy_loki_write_url: "https://loki.techmaju.com/loki/api/v1/push"
    alloy_loki_username: "lokiuser"
    alloy_scrape_targets: {}
    alloy_file_log_paths:
      - path: /var/log/syslog
        job: syslog
      - path: /var/log/auth.log
        job: auth
      - path: /home/techmaju/frappe-bench/logs/*.log
        job: frappe

  pre_tasks:
    - name: Ensure the host uses a Debian-family distribution
      ansible.builtin.assert:
        that:
          - ansible_facts.os_family == "Debian"
        fail_msg: "install_grafana_alloy.yml currently supports Debian-family hosts only."

    - name: Validate Prometheus basic auth variables are paired
      ansible.builtin.assert:
        that:
          - >-
            (alloy_prometheus_username | default('') | length == 0)
            ==
            (alloy_prometheus_password | default('') | length == 0)
        fail_msg: "Set both alloy_prometheus_username and alloy_prometheus_password (via group_vars/host_vars), or leave both empty."

    - name: Validate Loki basic auth variables are paired
      ansible.builtin.assert:
        that:
          - >-
            (alloy_loki_username | default('') | length == 0)
            ==
            (alloy_loki_password | default('') | length == 0)
        fail_msg: "Set both alloy_loki_username and alloy_loki_password (via group_vars/host_vars), or leave both empty."

  tasks:
    - name: Install APT prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - gpg
        state: present
        update_cache: true
        lock_timeout: "{{ alloy_apt_lock_timeout }}"
        update_cache_retries: "{{ alloy_apt_update_retries }}"
        update_cache_retry_max_delay: "{{ alloy_apt_update_retry_max_delay }}"
      register: apt_prerequisites_result
      retries: "{{ alloy_apt_task_retries }}"
      delay: "{{ alloy_apt_task_retry_delay }}"
      until: apt_prerequisites_result is succeeded

    - name: Ensure Grafana APT keyring directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Download Grafana APT signing key
      ansible.builtin.get_url:
        url: "{{ alloy_repo_key_url }}"
        dest: /tmp/grafana-apt.key
        mode: "0644"

    - name: Convert Grafana APT signing key to keyring format
      ansible.builtin.command:
        argv:
          - gpg
          - --dearmor
          - --yes
          - --output
          - "{{ alloy_repo_key_path }}"
          - /tmp/grafana-apt.key
      changed_when: false

    - name: Add Grafana APT repository
      ansible.builtin.apt_repository:
        repo: "{{ alloy_repo_definition }}"
        filename: grafana
        state: present
      register: grafana_repo

    - name: Install Grafana Alloy package
      ansible.builtin.apt:
        name: "{{ alloy_package_name }}"
        state: present
        update_cache: "{{ grafana_repo.changed }}"
        lock_timeout: "{{ alloy_apt_lock_timeout }}"
        update_cache_retries: "{{ alloy_apt_update_retries }}"
        update_cache_retry_max_delay: "{{ alloy_apt_update_retry_max_delay }}"
      register: apt_alloy_install_result
      retries: "{{ alloy_apt_task_retries }}"
      delay: "{{ alloy_apt_task_retry_delay }}"
      until: apt_alloy_install_result is succeeded

    - name: Ensure Alloy group exists
      ansible.builtin.group:
        name: "{{ alloy_group }}"
        system: true
        state: present

    - name: Ensure Alloy user exists
      ansible.builtin.user:
        name: "{{ alloy_user }}"
        group: "{{ alloy_group }}"
        home: "{{ alloy_storage_path }}"
        system: true
        shell: /usr/sbin/nologin
        create_home: false
        state: present

    - name: Ensure Alloy configuration directory exists
      ansible.builtin.file:
        path: "{{ alloy_config_dir }}"
        state: directory
        owner: root
        group: "{{ alloy_group }}"
        mode: "0750"

    - name: Ensure Alloy storage directory exists
      ansible.builtin.file:
        path: "{{ alloy_storage_path }}"
        state: directory
        owner: "{{ alloy_user }}"
        group: "{{ alloy_group }}"
        mode: "0750"

    - name: Deploy Grafana Alloy configuration
      ansible.builtin.template:
        src: templates/alloy-config.alloy.j2
        dest: "{{ alloy_config_path }}"
        owner: root
        group: "{{ alloy_group }}"
        mode: "0640"
        validate: "alloy fmt %s"
      no_log: "{{ (alloy_prometheus_password | default('') | length > 0) or (alloy_loki_password | default('') | length > 0) }}"
      notify: Restart Grafana Alloy

    - name: Configure Grafana Alloy defaults
      ansible.builtin.copy:
        dest: "{{ alloy_env_file }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          CONFIG_FILE={{ alloy_config_path }}
          CUSTOM_ARGS="--storage.path={{ alloy_storage_path }} --server.http.listen-addr={{ alloy_http_listen_addr }}"
      notify: Restart Grafana Alloy

    - name: Remove custom Alloy systemd unit override if present
      ansible.builtin.file:
        path: /etc/systemd/system/alloy.service
        state: absent
      notify:
        - Reload systemd
        - Restart Grafana Alloy

    - name: Flush handlers before enabling service
      ansible.builtin.meta: flush_handlers

    - name: Ensure Grafana Alloy service is enabled and started
      ansible.builtin.systemd:
        name: alloy
        enabled: true
        state: started

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart Grafana Alloy
      ansible.builtin.systemd:
        name: alloy
        state: restarted
